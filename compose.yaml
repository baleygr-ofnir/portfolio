---
services:
  api:
    build:
      context: ./portfolio-api
      dockerfile: Dockerfile
    container_name: portfolio-api
    restart: unless-stopped
    ports:
      - "${API_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${EXTERNAL_DB_CONNECTION_STRING}
      - AllowedOrigins__0=${DEVELOPMENT_DOMAIN}
      - AllowedOrigins__1=${PRODUCTION_DOMAIN}
      - SmtpSettings__Server=${SMTP_SERVER}
      - SmtpSettings__Port=${SMTP_PORT}
      - SmtpSettings__SenderName=${SMTP_SENDER_NAME}
      - SmtpSettings__SenderEmail=${SMTP_SENDER}
      - SmtpSettings__RecipientName=${SMTP_RECIPIENT_NAME}
      - SmtpSettings__RecipientEmail=${SMTP_RECIPIENT}
      - SmtpSettings__Username=${SMTP_USERNAME}
      - SmtpSettings__Password=${SMTP_PASSWORD}

  app:
    build:
      context: ./portfolio-app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${PRODUCTION_API_URL}
    container_name: portfolio-web
    restart: unless-stopped
    ports:
      - "${APP_PORT}:80"
    depends_on:
      - api

